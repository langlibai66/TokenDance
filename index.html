﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电动牙刷雷达图对比卡</title>
  <meta name="description" content="固定三款电动牙刷对比卡，支持切换与滑动查看雷达图变化动效。">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="phone-shell" aria-label="抖音风 9:16 对比界面">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <header class="status-bar">
          <span>9:41</span>
          <div class="status-icons" aria-hidden="true">
            <span class="signal-bars"><i></i><i></i><i></i><i></i></span>
            <span class="wifi-dot"></span>
            <span class="battery-pill"><b></b></span>
          </div>
        </header>

        <nav class="top-nav">
          <button type="button">关注</button>
          <button class="is-active" type="button">推荐</button>
          <button type="button">商城</button>
          <button type="button">对比</button>
        </nav>

        <section class="feed-stage">
          <div class="feed-glow"></div>

          <aside class="action-rail" aria-label="互动操作">
            <div class="avatar-badge">AI</div>
            <button class="rail-action" type="button"><span>赞</span><b>2.4w</b></button>
            <button class="rail-action" type="button"><span>评</span><b>618</b></button>
            <button class="rail-action" type="button"><span>藏</span><b>1.1k</b></button>
            <button class="rail-action" type="button"><span>转</span><b>266</b></button>
          </aside>

          <div class="feed-content">
            <div class="control-row">
              <div class="product-switcher" id="product-switcher" aria-label="商品切换"></div>
              <div class="toolbar-actions">
                <button class="ghost-button" id="prev-btn" type="button">上一款</button>
                <button class="primary-button" id="next-btn" type="button">下一款</button>
              </div>
            </div>

            <div class="swipe-tip">左右滑动商品卡可触发雷达图变化</div>

            <div class="swipe-card-shell" id="swipe-shell">
              <div class="stack-card stack-card-back"></div>
              <div class="stack-card stack-card-mid"></div>
              <article class="product-card" id="product-card">
                <div class="hero-row">
                  <div class="product-visual" id="product-visual">
                    <div class="visual-aura"></div>
                    <div class="brush-figure">
                      <span class="brush-head"></span>
                      <span class="brush-neck"></span>
                      <span class="brush-handle"></span>
                      <span class="brush-accent"></span>
                    </div>
                  </div>

                  <div class="product-main">
                    <div class="product-card__top">
                      <div>
                        <span class="product-chip" id="product-chip">旗舰刷感</span>
                        <h2 id="product-name">Laifen Wave</h2>
                      </div>
                      <div class="overall-box">
                        <span>综合分</span>
                        <strong id="overall-score">8.4</strong>
                      </div>
                    </div>

                    <div class="product-meta">
                      <div class="meta-item">
                        <span>价位</span>
                        <strong id="product-price">799 元</strong>
                      </div>
                      <div class="meta-item">
                        <span>续航</span>
                        <strong id="product-battery">30 天</strong>
                      </div>
                      <div class="meta-item">
                        <span>动力</span>
                        <strong id="product-motor">摆动 + 声波</strong>
                      </div>
                      <div class="meta-item">
                        <span>噪音</span>
                        <strong id="product-noise">58 dB</strong>
                      </div>
                    </div>

                    <p class="product-summary" id="product-summary">
                      适合想从基础电动牙刷升级到更完整刷感的人，优点集中在清洁结构、做工和视觉质感。
                    </p>

                    <div class="tag-row" id="tag-row"></div>
                  </div>
                </div>
              </article>
            </div>

            <section class="radar-panel">
              <div class="radar-panel__head">
                <div>
                  <span class="panel-kicker">六维雷达图</span>
                  <h3 id="radar-title">Laifen Wave 评分轮廓</h3>
                </div>
                <p id="radar-copy">切换商品时，雷达图会从当前轮廓平滑过渡到下一款产品。</p>
              </div>

              <div class="radar-stage">
                <svg class="radar-chart" viewBox="0 0 320 320" aria-hidden="true">
                  <g class="radar-grid">
                    <polygon points="160,38 265.65,99 265.65,221 160,282 54.35,221 54.35,99"></polygon>
                    <polygon points="160,62 244.78,111 244.78,209 160,258 75.22,209 75.22,111"></polygon>
                    <polygon points="160,86 223.91,123 223.91,197 160,234 96.09,197 96.09,123"></polygon>
                    <polygon points="160,110 203.04,135 203.04,185 160,210 116.96,185 116.96,135"></polygon>
                    <polygon points="160,134 182.17,147 182.17,173 160,186 137.83,173 137.83,147"></polygon>
                    <line x1="160" y1="160" x2="160" y2="28"></line>
                    <line x1="160" y1="160" x2="274.32" y2="94"></line>
                    <line x1="160" y1="160" x2="274.32" y2="226"></line>
                    <line x1="160" y1="160" x2="160" y2="292"></line>
                    <line x1="160" y1="160" x2="45.68" y2="226"></line>
                    <line x1="160" y1="160" x2="45.68" y2="94"></line>
                  </g>
                  <polygon class="radar-area" id="radar-area" points=""></polygon>
                  <g id="radar-points"></g>
                </svg>

                <div class="radar-label radar-label-top"><span>清洁力</span><strong id="label-0">9.0</strong></div>
                <div class="radar-label radar-label-top-right"><span>续航</span><strong id="label-1">8.5</strong></div>
                <div class="radar-label radar-label-bottom-right"><span>护龈</span><strong id="label-2">8.6</strong></div>
                <div class="radar-label radar-label-bottom"><span>噪音</span><strong id="label-3">7.2</strong></div>
                <div class="radar-label radar-label-bottom-left"><span>颜值</span><strong id="label-4">9.1</strong></div>
                <div class="radar-label radar-label-top-left"><span>价格</span><strong id="label-5">6.8</strong></div>
              </div>
            </section>

            <section class="compare-board">
              <div class="board-head">
                <div>
                  <span class="panel-kicker">横向对比</span>
                  <h3>六维单屏速看</h3>
                </div>
              </div>
              <div class="dimension-table" id="dimension-table"></div>
            </section>

            <section class="summary-row" id="summary-row"></section>

            <div class="caption-layer">
              <strong>@智能牙刷研究所</strong>
              <p>固定三款商品，滑动卡片或点品牌，直接看六维雷达图怎么变化。</p>
            </div>
          </div>
        </section>

        <footer class="bottom-nav">
          <button type="button">首页</button>
          <button type="button">朋友</button>
          <button class="plus-button" type="button" aria-label="发布"></button>
          <button type="button">消息</button>
          <button type="button">我</button>
        </footer>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
